<body>
    <header class="navbar">

            <a href="./index.html"><img id="logo" src="./img/brasao lobby.png" alt="Logo lobby"></a>
            <button class="menu-toggle" id="menu-toggle">&#9776;</button>
            <nav class="nav-links">

    <section>

                <div class="boasVindas">
                    <img src="./img/cavaleiro dando boas vindas.png" alt="Cavaleiro acenando">
                </div>

                <div id="nome">
                    <label for="nome">Nome:</label>
                    <input type="text" name="">

                </div>
                <div>
                    <label for="numero">
                        Número de celular:
                        <select class="dropdown-btn">
                            <option value="81">PE (81)</option>
                            <option value="71">BA (71)</option>
                            <option value="85">CE (85)</option>
                            <option value="98">MA (98)</option>
                            <option value="83">PB (83)</option>
                            <option value="84">RN (84)</option>
                            <option value="79">SE (79)</option>
                            <option value="82">AL (82)</option>
                        </select>
                    </label>
                    <input type="tel" name="" id="numeroCelular">
                </div>

                <div class="campo-senha">

                    <label for="senha">Senha:</label>

                    <div class="senha-container">

                        <input type="password" id="senha">

                        <span id="mostrarSenha">👁</span>

                    </div>

                    <p id="erroSenha"></p>

                </div>

                <div>
                    <label for="senha">Senha:</label>
                    <input type="password" name="" id="senha">
                </div>

                <div>
                    <label for="enviar"></label>
                    <input type="submit" name="" id="enviar">
                </div>


                <p>Já tem uma conta no Lobby? <a href="">Entre com seu cavalo.</a></p>
